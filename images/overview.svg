<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-family="Segoe UI, Arial" fill="#0B6FB0">Overview — KPI & Tendencias</text>

  <!-- KPI cards -->
  <g transform="translate(40,70)">
    <rect x="0" y="0" width="260" height="90" rx="8" fill="#f8fbff" stroke="#E6EEF6"/>
    <text x="16" y="28" font-size="12" fill="#333">Headcount Activo</text>
    <text x="16" y="60" font-size="28" fill="#0B6FB0">6</text>

    <rect x="300" y="0" width="260" height="90" rx="8" fill="#fff8f2" stroke="#FFEBD6"/>
    <text x="316" y="28" font-size="12" fill="#333">Turnover %</text>
    <text x="316" y="60" font-size="28" fill="#D9534F">6.5%</text>

    <rect x="560" y="0" width="260" height="90" rx="8" fill="#f6fff6" stroke="#E9F7EE"/>
    <text x="576" y="28" font-size="12" fill="#333">Promedio COPC</text>
    <text x="576" y="60" font-size="28" fill="#2E8B57">4.35</text>

    <rect x="820" y="0" width="260" height="90" rx="8" fill="#fffaf0" stroke="#FFF2E0"/>
    <text x="836" y="28" font-size="12" fill="#333">% Certificados COPC</text>
    <text x="836" y="60" font-size="28" fill="#FF8C00">72.2%</text>
  </g>

  <!-- Line chart mockup -->
  <g transform="translate(40,190)">
    <rect x="0" y="0" width="720" height="300" fill="#ffffff" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="14" fill="#333">Tendencia Promedio COPC (Últimos 12 meses)</text>
    <!-- X axis labels -->
    <text x="40" y="280" font-size="10" fill="#666">2025-07</text>
    <text x="120" y="280" font-size="10" fill="#666">2025-09</text>
    <text x="200" y="280" font-size="10" fill="#666">2025-11</text>
    <text x="280" y="280" font-size="10" fill="#666">2026-01</text>
    <text x="360" y="280" font-size="10" fill="#666">2026-03</text>
    <text x="440" y="280" font-size="10" fill="#666">2026-05</text>

    <!-- Line points -->
    <polyline points="40,210 120,200 200,190 280,195 360,190 440,185 520,185 600,175" fill="none" stroke="#2E8B57" stroke-width="3"/>
    <!-- markers -->
    <circle cx="40" cy="210" r="4" fill="#2E8B57" />
    <circle cx="120" cy="200" r="4" fill="#2E8B57" />
    <circle cx="200" cy="190" r="4" fill="#2E8B57" />
    <circle cx="280" cy="195" r="4" fill="#2E8B57" />
    <circle cx="360" cy="190" r="4" fill="#2E8B57" />
    <circle cx="440" cy="185" r="4" fill="#2E8B57" />
    <circle cx="520" cy="185" r="4" fill="#2E8B57" />
    <circle cx="600" cy="175" r="4" fill="#2E8B57" />
  </g>

  <!-- Combo chart mockup -->
  <g transform="translate(780,190)">
    <rect x="0" y="0" width="360" height="300" fill="#fff" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="14" fill="#333">Total Interactions / Promedio Quality</text>
    <!-- columns -->
    <rect x="40" y="180" width="24" height="100" fill="#0B6FB0"/>
    <rect x="80" y="150" width="24" height="130" fill="#0B6FB0"/>
    <rect x="120" y="170" width="24" height="110" fill="#0B6FB0"/>
    <!-- line -->
    <polyline points="28,150 68,140 108,145 148,135" fill="none" stroke="#2E8B57" stroke-width="3"/>
  </g>

  <!-- Footer table mockup -->
  <g transform="translate(40,520)">
    <rect x="0" y="0" width="1100" height="140" fill="#fafafa" stroke="#e9e9e9"/>
    <text x="12" y="24" font-size="12" fill="#333">Tabla resumen por compañía</text>
    <text x="20" y="52" font-size="11" fill="#000">Acme Contact Center</text>
    <text x="350" y="52" font-size="11" fill="#000">Headcount: 6</text>
    <text x="520" y="52" font-size="11" fill="#000">Avg COPC: 4.40</text>
    <text x="700" y="52" font-size="11" fill="#000">% Cert: 83%</text>
    <text x="880" y="52" font-size="11" fill="#000">Presupuesto: €150,000</text>

    <text x="20" y="80" font-size="11" fill="#000">Beta Support Ltd</text>
    <text x="350" y="80" font-size="11" fill="#000">Headcount: 4</text>
    <text x="520" y="80" font-size="11" fill="#000">Avg COPC: 4.10</text>
    <text x="700" y="80" font-size="11" fill="#000">% Cert: 25%</text>
    <text x="880" y="80" font-size="11" fill="#000">Presupuesto: MXN56,000</text>
  </g>
</svg>
