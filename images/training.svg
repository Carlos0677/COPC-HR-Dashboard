<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-family="Segoe UI, Arial" fill="#0B6FB0">Training — Capacitación y Certificados</text>

  <g transform="translate(40,80)">
    <rect x="0" y="0" width="1120" height="240" fill="#fff" stroke="#e6e6e6"/>
