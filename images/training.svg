    <!-- donut mockup (simple circles) -->
    <circle cx="240" cy="140" r="80" fill="#fff" stroke="#e6e6e6" stroke-width="12"/>
    <circle cx="240" cy="140" r="80" fill="none" stroke="#2E8B57" stroke-dasharray="251 100" stroke-width="12"/>

    <text x="420" y="80" font-size="11" fill="#000">COPC Nivel 1 — 78% completado</text>
