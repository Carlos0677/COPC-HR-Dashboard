<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-family="Segoe UI, Arial" fill="#0B6FB0">Attendance — Horas y Ausencias</text>

  <!-- Line chart area -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="1120" height="250" fill="#fff" stroke="#e6e6e6"/>
    <text x="12" y="20" font-size="12" fill="#333">Horas Promedio (últimos 30 días) por departamento</text>

    <!-- sample lines -->
    <polyline points="40,180 120,170 200,160 280,170 360,165 440,160 520,155 600,150 680,148" fill="none" stroke="#0B6FB0" stroke-width="3"/>
    <polyline points="40,200 120,190 200,185 280,180 360,175 440,170 520,168 600,165 680,160" fill="none" stroke="#FF8C00" stroke-width="3"/>
  </g>

  <!-- Matrix heatmap mockup -->
  <g transform="translate(40,350)">
    <rect x="0" y="0" width="720" height="300" fill="#fafafa" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="12" fill="#333">Ausencias (Departamentos x Mes)</text>

    <!-- headers -->
    <text x="120" y="52" font-size="10">2026-01</text>
    <text x="220" y="52" font-size="10">2026-02</text>
    <text x="320" y="52" font-size="10">2026-03</text>

    <!-- rows -->
    <text x="12" y="88" font-size="11">Soporte Telefónico</text>
    <rect x="120" y="72" width="80" height="28" fill="#ffcccc"/>
    <rect x="220" y="72" width="80" height="28" fill="#ffe6cc"/>
    <rect x="320" y="72" width="80" height="28" fill="#ccffcc"/>

    <text x="12" y="128" font-size="11">Calidad</text>
    <rect x="120" y="112" width="80" height="28" fill="#ccffcc"/>
    <rect x="220" y="112" width="80" height="28" fill="#ccffcc"/>
    <rect x="320" y="112" width="80" height="28" fill="#ffcccc"/>
  </g>

  <!-- Table mockup -->
  <g transform="translate(780,350)">
    <rect x="0" y="0" width="380" height="300" fill="#fff" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="12" fill="#333">Últimos registros de asistencia</text>
    <text x="12" y="54" font-size="11">María García | ACME-001 | 2026-06-01 | 09:00 | 17:00 | 8.0 | PRESENT</text>
    <text x="12" y="78" font-size="11">Carlos Ramírez | ACME-002 | 2026-06-01 | 09:15 | 17:00 | 7.75 | LATE</text>
    <text x="12" y="102" font-size="11">Lucía Hernández | ACME-003 | 2026-06-01 | - | - | 0 | ABSENT</text>
  </g>
</svg>
