<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-family="Segoe UI, Arial" fill="#0B6FB0">Performance — Evaluaciones</text>

  <!-- Bar chart mockup -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="1120" height="240" fill="#fff" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="12" fill="#333">Promedio performance por departamento</text>

    <rect x="60" y="80" width="500" height="30" fill="#2E8B57"/>
    <text x="60" y="74" font-size="11" fill="#000">Soporte Telefónico — 4.4</text>

    <rect x="60" y="130" width="420" height="30" fill="#0B6FB0"/>
    <text x="60" y="124" font-size="11" fill="#000">Calidad — 4.0</text>
  </g>

  <!-- Table reviews mockup -->
  <g transform="translate(40,350)">
    <rect x="0" y="0" width="1120" height="300" fill="#fafafa" stroke="#e6e6e6"/>
    <text x="12" y="22" font-size="12" fill="#333">Detalle de evaluaciones</text>
    <text x="12" y="54" font-size="11">María García | 2026-06-25 | Rating: 4.5 | Quality: 4.6 | "Buen desempeño"</text>
    <text x="12" y="78" font-size="11">Carlos Ramírez | 2026-06-25 | Rating: 3.8 | Quality: 3.5 | "Necesita mejorar"</text>
  </g>
</svg>
